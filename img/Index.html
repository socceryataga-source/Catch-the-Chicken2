<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Random Image Activity</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 10px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    img {
      max-width: 80%;
      max-height: 70vh;
      height: auto;
      border: 3px solid #333;
      border-radius: 10px;
      background: white;
    }

    #message {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <h1>Random Image Activity</h1>

  <button onclick="showImage()">START</button>
  <button onclick="resetImages()">RESET</button>

  <br>
  <img id="display" src="" alt="画像がここに表示されます">

  <div id="message">画像を確認中です...</div>

  <script>
    let images = [];
    let remainingImages = [];
    let initialized = false;

    function checkImageExists(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    async function loadImages() {
      const message = document.getElementById("message");
      images = [];

      let i = 1;
      while (true) {
        const baseName = `img${i}`;
        const path = `${baseName}.jpg`;   // ← ここを修正

        const exists = await checkImageExists(path);

        if (exists) {
          images.push(path);
          i++;
        } else {
          break;
        }
      }

      remainingImages = [...images];
      initialized = true;

      if (images.length === 0) {
        message.textContent =
          "画像が見つかりませんでした。\nimg1.jpg, img2.jpg ... がIndex.htmlと同じフォルダにあるか確認してください。";
      } else {
        message.textContent =
          `画像を ${images.length} 枚読み込みました。\nSTARTを押すとランダムに表示されます。`;
      }
    }

    function showImage() {
      const display = document.getElementById("display");
      const message = document.getElementById("message");

      if (!initialized) {
        message.textContent = "まだ画像を読み込み中です。少し待ってからSTARTを押してください。";
        return;
      }

      if (images.length === 0) {
        message.textContent =
          "表示できる画像がありません。\n画像名と保存場所を確認してください。";
        return;
      }

      if (remainingImages.length === 0) {
        message.textContent =
          "すべての画像を表示しました。\nもう一度行う場合はRESETを押してください。";
        return;
      }

      const randomIndex = Math.floor(Math.random() * remainingImages.length);
      const selectedImage = remainingImages[randomIndex];

      display.src = selectedImage;
      remainingImages.splice(randomIndex, 1);

      message.textContent = `残り ${remainingImages.length} 枚`;
    }

    function resetImages() {
      const display = document.getElementById("display");
      const message = document.getElementById("message");

      if (!initialized) {
        message.textContent = "まだ初期化中です。少し待ってください。";
        return;
      }

      remainingImages = [...images];
      display.src = "";
      message.textContent =
        `リセットしました。\n画像は全部で ${images.length} 枚です。STARTを押してください。`;
    }

    loadImages();
  </script>

</body>
</html>
